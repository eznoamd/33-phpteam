{% extends "base.html" %}

{% block title %}Acesso negado{% endblock %}

{% block content %}
<div class="error-page">
  <div class="error-container">
    <div class="error-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <h1 class="error-code">403</h1>
    <h2 class="error-title">Acesso negado</h2>
    <p class="error-description">
      Você precisa fazer login para acessar essa área do AgroHub.
    </p>
    <div class="error-actions">
      <a href="/login" class="btn btn-primary">Entrar no AgroHub</a>
      <a href="/catalogo" class="btn btn-ghost">Explorar catálogo</a>
    </div>
  </div>
</div>

<style>
.error-page {
  min-height: calc(100vh - 80px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
}

.error-container {
  text-align: center;
  max-width: 500px;
}

.error-icon {
  color: hsl(38, 92%, 50%);
  margin-bottom: 1.5rem;
}

.error-code {
  font-size: 6rem;
  font-weight: 800;
  color: hsl(0, 74%, 47%);
  line-height: 1;
  margin-bottom: 0.5rem;
}

.error-title {
  font-size: 1.75rem;
  font-weight: 600;
  color: hsl(0, 74%, 47%);
  margin-bottom: 1rem;
}

.error-description {
  font-size: 1.1rem;
  color: hsl(0, 74%, 47%);
  margin-bottom: 2rem;
  line-height: 1.6;
}

.error-actions {
  display: flex;
  gap: 1rem;
  justify-content: center;
  flex-wrap: wrap;
}
</style>
{% endblock %}
