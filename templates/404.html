{% extends "base.html" %}

{% block title %}Página não encontrada{% endblock %}

{% block content %}
<div class="error-page">
  <div class="error-container">
    <div class="error-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="15" y1="9" x2="9" y2="15"/>
        <line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
    </div>
    <h1 class="error-code">404</h1>
    <h2 class="error-title">Página não encontrada</h2>
    <p class="error-description">
      Essa página não existe no AgroHub. Que tal voltar ao início ou explorar o catálogo de produtores?
    </p>
    <div class="error-actions">
      <a href="/" class="btn btn-primary">Voltar ao início</a>
      <a href="/catalogo" class="btn btn-ghost">Explorar catálogo</a>
    </div>
  </div>
</div>

<style>
.error-page {
  min-height: calc(100vh - 80px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
}

.error-container {
  text-align: center;
  max-width: 500px;
}

.error-icon {
  color: hsl(0, 74%, 47%);
  margin-bottom: 1.5rem;
}

.error-code {
  font-size: 6rem;
  font-weight: 800;
  color: hsl(0, 74%, 47%);
  line-height: 1;
  margin-bottom: 0.5rem;
}

.error-title {
  font-size: 1.75rem;
  font-weight: 600;
  color: hsl(0, 74%, 47%);
  margin-bottom: 1rem;
}

.error-description {
  font-size: 1.1rem;
  color: hsl(0, 74%, 47%);
  margin-bottom: 2rem;
  line-height: 1.6;
}

.error-actions {
  display: flex;
  gap: 1rem;
  justify-content: center;
  flex-wrap: wrap;
}
</style>
{% endblock %}
