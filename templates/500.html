{% extends "base.html" %}

{% block title %}Erro interno do servidor{% endblock %}

{% block content %}
<div class="error-page">
  <div class="error-container">
    <div class="error-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/>
        <line x1="12" y1="9" x2="12" y2="13"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
    </div>
    <h1 class="error-code">500</h1>
    <h2 class="error-title">Algo deu errado</h2>
    <p class="error-description">
      Ocorreu um erro inesperado no AgroHub. Já fomos notificados e estamos trabalhando para resolver.
    </p>
    <div class="error-actions">
      <a href="/" class="btn btn-primary">Voltar ao início</a>
      <a href="/catalogo" class="btn btn-ghost">Explorar catálogo</a>
    </div>
  </div>
</div>

<style>
.error-page {
  min-height: calc(100vh - 80px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
}

.error-container {
  text-align: center;
  max-width: 500px;
}

.error-icon {
  color: hsl(0, 74%, 47%);
  margin-bottom: 1.5rem;
}

.error-code {
  font-size: 6rem;
  font-weight: 800;
  color: hsl(0, 74%, 47%);
  line-height: 1;
  margin-bottom: 0.5rem;
}

.error-title {
  font-size: 1.75rem;
  font-weight: 600;
  color: hsl(0, 74%, 47%);
  margin-bottom: 1rem;
}

.error-description {
  font-size: 1.1rem;
  color: hsl(0, 74%, 47%); 
  margin-bottom: 2rem;
  line-height: 1.6;
}

.error-actions {
  display: flex;
  gap: 1rem;
  justify-content: center;
  flex-wrap: wrap;
}
</style>
{% endblock %}
