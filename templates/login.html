{% extends "base.html" %}
{% block title %}Entrar{% endblock %}

{% block content %}
<div class="page-sm" style="padding-top:3rem;">
  <div style="text-align:center; margin-bottom:2rem;">
    <div style="font-size:2.2rem; margin-bottom:0.75rem;">🌾</div>
    <h1 style="font-family:var(--font-display); font-size:1.7rem; font-weight:700; color:var(--white); margin-bottom:0.3rem;">Bem-vindo de volta</h1>
    <p style="color:var(--text-muted); font-size:0.9rem;">
      Não tem conta?
      <a href="/cadastro" style="color:var(--verde-light); text-decoration:none; font-weight:600;">Cadastre-se</a>
    </p>
  </div>

  <div class="card">
    {% for msg in flash_messages %}
      <div class="flash {{ msg.tipo }}" style="margin-bottom:1rem;">{{ msg.texto }}</div>
    {% endfor %}

    <form method="POST" action="/auth/login-form">
      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" required autofocus
               placeholder="seu@email.com"
               value="{{ request.cookies.get('flash_email', '') }}" />
      </div>
      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" required placeholder="••••••••" />
      </div>
      <button type="submit" class="btn btn-primary w-full" style="margin-top:0.5rem;">Entrar no AgroHub →</button>
    </form>
  </div>
</div>
{% endblock %}
