{% extends "base.html" %}
{% block title %}Cadastrar{% endblock %}

{% block styles %}
<style>
  .perfil-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; margin-bottom: 1.25rem; }
  .perfil-opt { border: 2px solid var(--border); border-radius: var(--radius); padding: 1rem 0.75rem; text-align: center; cursor: pointer; transition: all 0.15s; }
  .perfil-opt:has(input:checked) { border-color: var(--verde-mid); background: var(--verde-glow); }
  .perfil-opt input { display: none; }
  .perfil-opt-icon { display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: var(--radius); background: var(--surface-2); border: 1px solid var(--border); margin: 0 auto 0.5rem; color: var(--text-soft); }
  .perfil-opt:has(input:checked) .perfil-opt-icon { background: var(--verde-glow); border-color: var(--verde-mid); color: var(--verde-light); }
  .perfil-opt-name { font-size: 0.8rem; font-weight: 600; color: var(--text-soft); }
  .perfil-opt-desc { font-size: 0.72rem; color: var(--text-muted); margin-top: 0.2rem; }
</style>
{% endblock %}

{% block content %}
<div class="page-sm" style="padding-top:2.5rem;">
  <div style="text-align:center; margin-bottom:2rem;">
    <div style="display:flex; align-items:center; justify-content:center; width:52px; height:52px; border-radius:var(--radius-lg); background:var(--verde-glow); border:1px solid rgba(74,124,35,0.3); margin:0 auto 0.75rem;">
      <svg class="icon-lg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="var(--verde-light)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
    </div>
    <h1 style="font-family:var(--font-display); font-size:1.7rem; font-weight:400; color:var(--white); margin-bottom:0.3rem;">Criar sua conta</h1>
    <p style="color:var(--text-muted); font-size:0.9rem;">
      Já tem conta?
      <a href="/login" style="color:var(--verde-light); text-decoration:none; font-weight:600;">Fazer login</a>
    </p>
  </div>

  <div class="card">
    {% for msg in flash_messages %}
      <div class="flash {{ msg.tipo }}" style="margin-bottom:1rem;">{{ msg.texto }}</div>
    {% endfor %}

    <form method="POST" action="/cadastro">
      <div class="form-group">
        <label>Tipo de conta</label>
        <div class="perfil-cards">
          <label class="perfil-opt">
            <input type="radio" name="perfil" value="produtor" checked />
            <div class="perfil-opt-icon">
              <svg class="icon-md" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            </div>
            <div class="perfil-opt-name">Produtor</div>
            <div class="perfil-opt-desc">Vendo produtos agrícolas</div>
          </label>
          <label class="perfil-opt">
            <input type="radio" name="perfil" value="transportador" />
            <div class="perfil-opt-icon">
              <svg class="icon-md" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
            </div>
            <div class="perfil-opt-name">Transportador</div>
            <div class="perfil-opt-desc">Transporto cargas</div>
          </label>
          <label class="perfil-opt">
            <input type="radio" name="perfil" value="comprador" />
            <div class="perfil-opt-icon">
              <svg class="icon-md" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
            </div>
            <div class="perfil-opt-name">Comprador</div>
            <div class="perfil-opt-desc">Quero comprar produtos</div>
          </label>
        </div>
      </div>

      <div class="form-group">
        <label for="nome">Nome completo</label>
        <input type="text" id="nome" name="nome" required autofocus placeholder="João da Silva" value="{{ nome_anterior or '' }}" />
      </div>
      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" required placeholder="seu@email.com" value="{{ email_anterior or '' }}" />
      </div>
      <div class="form-group">
        <label for="senha">Senha <span style="color:var(--text-muted); font-size:0.75rem;">(mínimo 6 caracteres)</span></label>
        <input type="password" id="senha" name="senha" required placeholder="••••••••" />
      </div>

      <button type="submit" class="btn btn-primary w-full" style="margin-top:0.5rem;">
        Criar conta
        <svg class="icon-sm" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
    </form>

    <p style="font-size:0.72rem; color:var(--text-muted); text-align:center; margin-top:1rem;">
      Ao criar uma conta você concorda com os Termos de Uso.
    </p>
  </div>
</div>
{% endblock %}
